# ニュース・天気のリサーチ設定（W5）
# いずれも無料・APIキー不要。
news:
  # Google News RSS（日本語・日本版）。max_items 件の見出しを読み上げる。
  rss_url: "https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja"
  max_items: 5
weather:
  # 気象庁 予報 API のエリアコード。例: 東京=130000 / 大阪=270000 / 北海道(石狩)=016000。
  # https://www.jma.go.jp/bosai/forecast/data/forecast/{area_code}.json
  area_code: "130000"
  area_name: "東京地方"   # JSON 内の対象エリア名（areas[].area.name と一致させる）
# {news} と {weather} に取得結果が入る（NewsWeatherProvider が準備時に展開）。
# 冒頭の {hour12}時{minute}分 は時刻プレースホルダ（W8）。BroadcastEngine が発話直前に実時刻で展開する
# （Provider は未知キーとして原文保持 → エンジンで二段展開。ローリング先読みのズレを受けず再生時点で正確）。
announcement_template: "時刻は{hour12}時{minute}分になりました。ニュースの時間です。{news} 続いて、天気予報です。{weather} 以上、ニュースと天気予報でした。"

# LLM によるアナウンサー原稿生成（W11）。時報イントロと締めは固定、本文だけ LLM が書く。
# 読み手のペルソナは program.yaml の news セグメント dj_id（青山龍星）から取る。
# LLM 不調時は上の announcement_template に倒す（fail-tolerant）。
llm_script:
  style_hint: "落ち着いた低めのトーンで、聞き手に語りかけるように簡潔に"
  target_minutes: 2
  chars_per_minute: 320
  # intro / outro は省略時の既定を使用（時報イントロ / 「以上、ニュースと天気予報でした。」）
