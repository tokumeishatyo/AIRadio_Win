banter:
  - main: reimu
    requires: [marisa]
    directive: "霊夢が問いかけ、魔理沙が答える掛け合いを基調にする。冒頭は霊夢が『ねえ魔理沙』と自然に話を振るところから始め、以降も要所で霊夢→魔理沙のやり取りを織り交ぜる。（仮）"
