# 掛け合い指示（W-DLG）。main DJ が requires の相手と組む free_talk トークの台本に注入する。
# LLM 生成ゆえ「ねえ魔理沙」始まりは強誘導（完全保証不可）。
#   main:      cast の先頭（メイン）DJ id
#   requires:  cast に必須の相手 DJ id（省略可・全員在席で発火）
#   directive: LLM への指示（日本語・そのまま 1 制約として注入）
banter:
  - main: reimu
    requires: [marisa]
    directive: "最初のセリフは必ず霊夢の「ねえ魔理沙」で始める。以降は霊夢が問いかけ、魔理沙がテンション高めに「だぜ」「だな」で答える掛け合いを基調にする。"
