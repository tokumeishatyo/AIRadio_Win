# 番組フォーマット（W13, v2 = 部品宣言）。セグメント列は ProgramPlan がコーナー数 N から決定論的に生成する。
# 構成: opening → song(冒頭曲) → 本編(talk, talk, letter, news の繰り返し + 端数) → ending。
#   N = talk(free_talk)コーナーの本数。お便り/ニュース/OP/冒頭曲/ED は数えない。
# default_length: メニュー「番組の長さ」の既定値（1 以上の整数 / "endless"）。メニューは 10/20/30 のみ提示。
#   メニューでの選択は %LOCALAPPDATA%\AIRadio\program-length に永続化され、次の放送開始から反映される。
# anchor_dj_id: OP / news / ED を読む DJ（djs.yaml の id）。
# opening.critical: true なら OP 失敗時にスキップせず放送中止（既定 true）。
# song(冒頭曲): OP 直後の「本日の1曲目」。この曲の再生中に次のトーク台本を裏で準備し、無音区間を消す。
# talk/letter.corner_id: corners.yaml の id（free_talk / letter）。
# news.dj_id: ニュース・天気の専任読み手（未指定は anchor が読む）。
program:
  title: "ケイラボAIラジオ"
  anchor_dj_id: zundamon
  default_length: 10          # 10 / 20 / 30 / endless（メニューは 10/20/30）
  opening:
    critical: true
  song:                       # 冒頭曲（OP 直後の本日の1曲目）
    song_prompt_hint: "一日の始まりや番組の幕開けに合う、前向きで広く知られた曲"
    fallback_track_uri: "spotify:track:5jsqaNOAbeBG5QYL7JpySJ"
    volume: 100
    play_seconds: 0           # 0 = 曲の長さぶんフル再生（この間に次の台本を準備）
  talk:
    corner_id: free_talk
  letter:
    corner_id: letter         # お便りコーナー（W12。format: letter のコーナーを参照）
  news:
    dj_id: ryusei             # ニュース・天気の専任読み手（青山龍星。曜日に依存しない固定）
  guest:
    corner_id: guest          # ゲストコーナー（W14。最初のニュース直後に 1 回。guests.yaml からランダム選定）
  # 曜日替わりメイン DJ（W13.5。先頭＝メインが OP/ED/時報リード文/トークを仕切る。省略時はコード側 Standard）。
  weekly_cast:
    sunday:    [zundamon, metan, tsumugi]
    monday:    [zundamon, metan]
    tuesday:   [metan, tsumugi]
    wednesday: [tsumugi, zundamon]
    thursday:  [zundamon, metan]
    friday:    [metan, tsumugi]
    saturday:  [tsumugi, zundamon]
