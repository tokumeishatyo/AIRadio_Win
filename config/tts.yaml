# VOICEVOX 接続設定
# endpoint: ローカル HTTP サーバ（127.0.0.1 を使い IPv6 ::1 解決遅延を回避）
# credit:   ライセンス遵守のクレジット表記。{speaker} は DJ 表示名に置換される（後続スライス）
voicevox:
  endpoint: "http://127.0.0.1:50021/"
  credit: "VOICEVOX:{speaker}"
# 合成音声の再生音量（0.0〜1.0）。VOICEVOX はほぼフルスケールで出力されるため、
# Spotify の音楽より声が大きすぎる場合はここを下げてバランスを取る。
playback_volume: 1.0
# 話速（1.0 = 標準、0.5〜2.0）。1.1〜1.3 がテンポの良いラジオの目安。
speed_scale: 1.15
