# VOICEVOX 接続設定
# endpoint: ローカル HTTP サーバ（127.0.0.1 を使い IPv6 ::1 解決遅延を回避）
# credit:   ライセンス遵守のクレジット表記。{speaker} は DJ 表示名に置換される（後続スライス）
voicevox:
  endpoint: "http://127.0.0.1:50021/"
  credit: "VOICEVOX:{speaker}"
  # exe_path: アプリ起動時に VOICEVOX を自動起動する exe パス（任意・W-Win）。
  #           未設定なら標準インストール先（%LOCALAPPDATA%\Programs\VOICEVOX\VOICEVOX.exe 等）を探索する。
  # exe_path: "C:\\Users\\<you>\\AppData\\Local\\Programs\\VOICEVOX\\VOICEVOX.exe"
# 合成音声の再生音量（0.0〜1.0）。VOICEVOX はほぼフルスケールで出力されるため、
# Spotify の音楽より声が大きすぎる場合はここを下げてバランスを取る。
playback_volume: 1.0
# 話速（1.0 = 標準、0.5〜2.0）。1.1〜1.3 がテンポの良いラジオの目安。
speed_scale: 1.15

# AquesTalk1（初代 TTS・W-AQT。djs.yaml/guests.yaml の tts_backend: aquestalk な DJ で使用）。
# 声種DLL・辞書は native/（BYO・gitignore 対象）に配置する:
#   voices_dir 下に <声種>/AquesTalk.dll（f1/f2/f3/m1/m2/dvd/imd1/jgr/r1）
#   dict_dir 下に AqKanji2Koe.dll と aq_dic/（aqdic.bin, aq_user.dic, CREDITS）
# ライセンスキーは config/aquestalk.local.yaml（gitignore）で別途設定（.sample 参照）。
aquestalk:
  voices_dir: "native/aqtk1"
  dict_dir: "native/aqk2k"
  speed: 120   # 発話速度[%] 50-300（100=標準・120=約1.2倍／霊夢・魔理沙に適用。速さの微調整はこの値で）
