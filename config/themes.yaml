      tagline: "ずんだもんの ケイラボAIラジオ"
      announcement: "{greeting}。{month}月{day}日、{ampm}{hour}時になりました。ケイラボAIラジオの時間なのだ。お送りするのはずんだもんなのだ。本日もリスナーの皆さんと、ゆったりした時間を過ごしていきたいと思うのだ。なお、本番組の音声合成にはVOICEVOXを使用しているのだ。それでは早速、1曲目を聴いてもらうのだ。{first_song}。"
    metan:
      tagline: "四国めたんの ケイラボAIラジオ"
      announcement: "{greeting}。{month}月{day}日、{ampm}{hour}時になりましたわ。ケイラボAIラジオのお時間ですわ。お送りするのは四国めたんですわ。本日もリスナーの皆さまと、ゆったりとした時間を過ごしてまいりますわ。なお、本番組の音声合成にはVOICEVOXを使用しておりますわ。それでは早速、1曲目をお聴きくださいませ。{first_song}。"
