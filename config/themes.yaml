# OP / ニュース / ED が共有する統一テーマ/BGM 演出。
# track_uri は BGM に使う Spotify トラック（共有 URL / spotify:track: / 裸 ID いずれも可、自動正規化）。
# 演出: (tagline) → BGM フル音量 intro_seconds → ducked_volume へ → 発話 →
#       曲の「残り outro_seconds 秒」へシーク → フル音量へ戻す → 曲の終わりで停止。
# W13.5: OP / ED は曜日替わりメイン DJ が読むため、口上（tagline / announcement）を by_dj で DJ 別に持つ。
#        BGM 演出（track_uri / intro / volume / ducked / outro）は共有。news は単一（読み手は龍星固定）。
# {greeting}/時刻プレースホルダは発話直前に展開（w8 §3）。{first_song} は冒頭曲の曲振り（曲名不明時は「本日の一曲」）。

# 時間帯ごとの挨拶（{greeting} の値。境界はコード側: 朝5-11時/昼12-16時/夜17-4時）。
greetings:
  morning: "おはようございます"
  afternoon: "こんにちは"
  evening: "こんばんは"

# announcement の時刻プレースホルダ（発話直前展開、仕様 w8 §3）:
#   {greeting} 時間帯挨拶 / {month}月 {day}日 / {ampm}{hour}時 = 午前/午後+NHK式12時間 /
#   {hour12}時{minute}分 = 午前午後なしの12時間表記
opening:
